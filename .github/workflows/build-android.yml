name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android --ignore-failed-sources

      - name: Fully replace SDK 35 with SDK 34.0.95
        run: |
          SDK35="/usr/share/dotnet/packs/Microsoft.Android.Sdk.Linux/35.0.105"
          echo "Downloading SDK 34.0.95..."
          curl -sL "https://www.nuget.org/api/v2/package/Microsoft.Android.Sdk.Linux/34.0.95" \
            -o /tmp/sdk34.nupkg
          echo "Size: $(du -sh /tmp/sdk34.nupkg)"

          mkdir -p /tmp/sdk34
          unzip -q /tmp/sdk34.nupkg -d /tmp/sdk34
          echo "Top-level folders in nupkg:"
          ls /tmp/sdk34/

          # Replace tools folder entirely
          if [ -d /tmp/sdk34/tools ]; then
            sudo cp -rf /tmp/sdk34/tools/* "$SDK35/tools/"
            echo "✓ tools/ replaced"
          fi

          # Replace targets folder entirely
          if [ -d /tmp/sdk34/targets ]; then
            sudo cp -rf /tmp/sdk34/targets/* "$SDK35/targets/"
            echo "✓ targets/ replaced"
          fi

          # Replace props folder if exists
          if [ -d /tmp/sdk34/props ]; then
            sudo cp -rf /tmp/sdk34/props/* "$SDK35/props/"
            echo "✓ props/ replaced"
          fi

          echo "Done. SDK 35 tools now contain SDK 34 binaries."
          echo "Build.Tasks version check:"
          strings "$SDK35/tools/Xamarin.Android.Build.Tasks.dll" 2>/dev/null | grep "Version=" | head -3 || true

      - name: Restore
        run: dotnet restore SignalScanner.csproj

      - name: Build APK
        run: |
          dotnet build SignalScanner.csproj \
            -f net9.0-android \
            -c Debug \
            -t:SignAndroidPackage \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:AndroidSigningKeyAlias=androiddebugkey \
            -p:AndroidSigningKeyPass=android \
            -p:AndroidSigningStorePass=android

      - name: Find APK
        run: find /home/runner/work -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SignalScanner-Debug-APK
          path: "**/*.apk"
          retention-days: 30
          if-no-files-found: warn
