name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android --ignore-failed-sources

      - name: Replace ONLY tools DLLs from SDK 34 (keep targets intact)
        run: |
          SDK35_TOOLS="/usr/share/dotnet/packs/Microsoft.Android.Sdk.Linux/35.0.105/tools"

          echo "Downloading SDK 34.0.95..."
          curl -sL "https://www.nuget.org/api/v2/package/Microsoft.Android.Sdk.Linux/34.0.95" \
            -o /tmp/sdk34.nupkg

          mkdir -p /tmp/sdk34
          unzip -q /tmp/sdk34.nupkg -d /tmp/sdk34

          echo "Replacing only DLLs and JARs in tools/ (keeping .targets files):"
          sudo cp -f /tmp/sdk34/tools/*.dll  "$SDK35_TOOLS/" && echo "✓ DLLs"
          sudo cp -f /tmp/sdk34/tools/*.jar  "$SDK35_TOOLS/" 2>/dev/null && echo "✓ JARs" || true
          sudo cp -f /tmp/sdk34/tools/*.exe  "$SDK35_TOOLS/" 2>/dev/null && echo "✓ EXEs" || true

          # Also replace the build tasks in the inner tools subfolder if exists
          if [ -d /tmp/sdk34/tools/MSBuild ]; then
            sudo cp -rf /tmp/sdk34/tools/MSBuild "$SDK35_TOOLS/"
            echo "✓ MSBuild subfolder"
          fi

          echo "Verify - BuildApk DLL version:"
          dotnet-ildasm "$SDK35_TOOLS/Xamarin.Android.Build.Tasks.dll" 2>/dev/null | head -5 || \
          strings "$SDK35_TOOLS/Xamarin.Android.Build.Tasks.dll" | grep "35\|34" | head -5 || true

      - name: Restore
        run: dotnet restore SignalScanner.csproj

      - name: Build APK
        run: |
          dotnet build SignalScanner.csproj \
            -f net9.0-android \
            -c Debug \
            -t:SignAndroidPackage \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:AndroidSigningKeyAlias=androiddebugkey \
            -p:AndroidSigningKeyPass=android \
            -p:AndroidSigningStorePass=android

      - name: Find APK
        run: find /home/runner/work -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SignalScanner-Debug-APK
          path: "**/*.apk"
          retention-days: 30
          if-no-files-found: warn
