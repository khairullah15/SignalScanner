name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android --ignore-failed-sources

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Restore NuGet packages
        run: dotnet restore SignalScanner.csproj

      - name: Build APK via MSBuild SignAndroidPackage
        run: >
          dotnet build SignalScanner.csproj
          -f net9.0-android
          -c Debug
          -t:SignAndroidPackage
          -p:AndroidPackageFormat=apk
          -p:AndroidKeyStore=false
          -p:AndroidSigningKeyAlias=androiddebugkey
          -p:AndroidSigningKeyPass=android
          -p:AndroidSigningStorePass=android
        shell: pwsh

      - name: Find APK
        run: |
          Write-Host "=== All APK files on runner ==="
          Get-ChildItem -Path "D:\a" -Recurse -Filter "*.apk" -ErrorAction SilentlyContinue | Select-Object FullName
        shell: pwsh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SignalScanner-Debug-APK
          path: D:\a\**\*.apk
          retention-days: 30
          if-no-files-found: warn
