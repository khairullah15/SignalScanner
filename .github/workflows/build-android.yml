name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      # Pin to maui 9.0.10 which ships Android SDK 34 (not broken 35)
      - name: Install pinned MAUI workload 9.0.10
        run: |
          dotnet workload install maui-android --version 9.0.10 --ignore-failed-sources || \
          dotnet workload install maui-android --ignore-failed-sources

      - name: Show Android SDK version
        run: find /usr/share/dotnet/packs -maxdepth 1 -name "Microsoft.Android.Sdk*" | sort

      - name: Restore NuGet packages
        run: dotnet restore SignalScanner.csproj

      - name: Build APK
        run: |
          dotnet build SignalScanner.csproj \
            -f net9.0-android \
            -c Debug \
            -t:SignAndroidPackage \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:AndroidSigningKeyAlias=androiddebugkey \
            -p:AndroidSigningKeyPass=android \
            -p:AndroidSigningStorePass=android

      - name: Find APK
        run: |
          echo "=== All APK files ==="
          find /home/runner/work -name "*.apk" 2>/dev/null || true
          find . -name "*.apk" 2>/dev/null || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SignalScanner-Debug-APK
          path: |
            **/bin/Debug/**/*.apk
            **/bin/Release/**/*.apk
            **/*.apk
          retention-days: 30
          if-no-files-found: warn
