name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    container:
      image: mcr.microsoft.com/dotnet/sdk:9.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK tools
        run: |
          apt-get update -qq
          apt-get install -y wget unzip curl

          mkdir -p /opt/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /opt/android-sdk/cmdline-tools
          mv /opt/android-sdk/cmdline-tools/cmdline-tools /opt/android-sdk/cmdline-tools/latest

          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin

          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-35" "platforms;android-34" "build-tools;35.0.0" "build-tools;34.0.0"

          echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV

      - name: Install MAUI workload
        run: dotnet workload install maui-android --ignore-failed-sources

      - name: Restore
        run: dotnet restore SignalScanner.csproj

      - name: Build APK
        run: |
          dotnet build SignalScanner.csproj \
            -f net9.0-android \
            -c Debug \
            -t:SignAndroidPackage \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:AndroidSigningKeyAlias=androiddebugkey \
            -p:AndroidSigningKeyPass=android \
            -p:AndroidSigningStorePass=android \
            -p:AndroidSdkDirectory=/opt/android-sdk

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SignalScanner-APK
          path: "**/*.apk"
          retention-days: 30
          if-no-files-found: warn
