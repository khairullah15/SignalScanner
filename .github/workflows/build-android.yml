name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android --ignore-failed-sources

      # Show folder structure so we can see where csproj actually is
      - name: Show repo structure
        run: Get-ChildItem -Recurse -Filter "*.csproj" | Select-Object FullName
        shell: pwsh

      - name: Restore NuGet packages
        run: dotnet restore SignalScanner/SignalScanner.csproj

      - name: Build Android APK (Debug)
        run: dotnet build SignalScanner/SignalScanner.csproj -f net8.0-android -c Debug -p:AndroidPackageFormat=apk -p:AndroidKeyStore=false
        shell: pwsh

      # Find the APK wherever it ended up
      - name: Find APK
        run: Get-ChildItem -Recurse -Filter "*.apk" | Select-Object FullName
        shell: pwsh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SignalScanner-Debug-APK
          path: |
            **/bin/Debug/**/*.apk
            **/bin/Release/**/*.apk
          retention-days: 30
          if-no-files-found: warn
