name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Remove SDK 35 and install workload
        run: |
          sudo rm -rf /usr/share/dotnet/packs/Microsoft.Android.Sdk.Linux/35* 2>/dev/null || true
          dotnet workload install maui-android --ignore-failed-sources
          echo "=== Installed Android packs ==="
          ls /usr/share/dotnet/packs/ | grep -i android

      - name: Restore
        run: dotnet restore SignalScanner.csproj

      - name: Build APK (full output)
        run: |
          dotnet build SignalScanner.csproj \
            -f net9.0-android \
            -c Debug \
            -t:SignAndroidPackage \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:AndroidSigningKeyAlias=androiddebugkey \
            -p:AndroidSigningKeyPass=android \
            -p:AndroidSigningStorePass=android
        continue-on-error: true

      - name: Show full bin/obj contents
        run: |
          echo "=== bin folder ==="
          find . -path "*/bin/Debug/net9.0-android*" | sort
          echo ""
          echo "=== obj/android/bin folder ==="
          find . -path "*/obj/Debug/net9.0-android/android/bin*" | sort
          echo ""
          echo "=== ALL apk files ==="
          find /home/runner/work -name "*.apk" 2>/dev/null || echo "none found"
          find /home/runner/work -name "*.aab" 2>/dev/null || echo "no aab found"

      - name: Upload whatever was produced
        uses: actions/upload-artifact@v4
        with:
          name: SignalScanner-Build-Output
          path: |
            **/bin/Debug/net9.0-android/**
            **/obj/Debug/net9.0-android/android/bin/**
          retention-days: 5
          if-no-files-found: warn
