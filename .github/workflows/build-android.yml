name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-android:
    runs-on: windows-latest   # MAUI Android builds best on Windows runner

    steps:

      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup .NET 8 ───────────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── 3. Install MAUI Android workload ──────────────────────────────────
      - name: Install MAUI workload
        run: dotnet workload install maui-android --ignore-failed-sources

      # ── 4. Restore NuGet packages ─────────────────────────────────────────
      - name: Restore NuGet packages
        run: dotnet restore SignalScanner/SignalScanner.csproj

      # ── 5. Build debug APK ────────────────────────────────────────────────
      - name: Build Android APK (Debug)
        run: >
          dotnet build SignalScanner/SignalScanner.csproj
          -f net8.0-android
          -c Debug
          -p:AndroidPackageFormat=apk
          -p:AndroidKeyStore=false

      # ── 6. Upload APK as artifact ─────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SignalScanner-Debug-APK
          path: |
            SignalScanner/bin/Debug/net8.0-android/*.apk
          retention-days: 30
          if-no-files-found: error
