name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android --ignore-failed-sources

      # Replace broken Build Tasks DLL with one from working SDK 34
      - name: Replace broken Xamarin.Android.Build.Tasks.dll with SDK 34 version
        run: |
          BROKEN_DLL="/usr/share/dotnet/packs/Microsoft.Android.Sdk.Linux/35.0.105/tools/Xamarin.Android.Build.Tasks.dll"
          echo "Broken DLL exists: $(test -f "$BROKEN_DLL" && echo YES || echo NO)"

          # Download SDK 34.0.95 nupkg and extract the working DLL
          echo "Downloading Microsoft.Android.Sdk.Linux 34.0.95..."
          curl -sL "https://www.nuget.org/api/v2/package/Microsoft.Android.Sdk.Linux/34.0.95" \
            -o /tmp/sdk34.nupkg

          echo "Download size: $(du -sh /tmp/sdk34.nupkg)"

          # Extract just the build tasks DLL
          unzip -p /tmp/sdk34.nupkg \
            "tools/Xamarin.Android.Build.Tasks.dll" \
            > /tmp/Xamarin.Android.Build.Tasks.dll 2>/dev/null

          if [ -s /tmp/Xamarin.Android.Build.Tasks.dll ]; then
            echo "Extracted DLL size: $(du -sh /tmp/Xamarin.Android.Build.Tasks.dll)"
            sudo cp /tmp/Xamarin.Android.Build.Tasks.dll "$BROKEN_DLL"
            echo "✓ DLL replaced successfully"
          else
            echo "DLL not found in nupkg, listing contents..."
            unzip -l /tmp/sdk34.nupkg | grep -i "build.tasks" | head -10
            unzip -l /tmp/sdk34.nupkg | grep -i "\.dll" | head -20
          fi

      - name: Restore
        run: dotnet restore SignalScanner.csproj

      - name: Build APK
        run: |
          dotnet build SignalScanner.csproj \
            -f net9.0-android \
            -c Debug \
            -t:SignAndroidPackage \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:AndroidSigningKeyAlias=androiddebugkey \
            -p:AndroidSigningKeyPass=android \
            -p:AndroidSigningStorePass=android

      - name: Find APK
        run: find /home/runner/work -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SignalScanner-Debug-APK
          path: "**/*.apk"
          retention-days: 30
          if-no-files-found: warn
