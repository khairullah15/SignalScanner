name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android --ignore-failed-sources

      - name: Restore NuGet packages
        run: dotnet restore SignalScanner.csproj

      - name: Build Android APK (Debug)
        run: dotnet build SignalScanner.csproj -f net9.0-android -c Debug -p:AndroidPackageFormat=apk -p:AndroidKeyStore=false
        shell: pwsh

      # Search entire drive for the APK so we know exact path
      - name: Find APK (search all)
        run: |
          Write-Host "=== Searching for APK files ==="
          Get-ChildItem -Path "D:\a" -Recurse -Filter "*.apk" -ErrorAction SilentlyContinue | Select-Object FullName
          Write-Host "=== Searching for signed APK ==="
          Get-ChildItem -Path "D:\a" -Recurse -Filter "*-Signed.apk" -ErrorAction SilentlyContinue | Select-Object FullName
          Write-Host "=== bin folder contents ==="
          Get-ChildItem -Path "D:\a\SignalScanner\SignalScanner\bin" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
        shell: pwsh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SignalScanner-Debug-APK
          path: |
            D:\a\SignalScanner\SignalScanner\bin\**\*.apk
          retention-days: 30
          if-no-files-found: warn
