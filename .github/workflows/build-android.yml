name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-22.04   # Use older Ubuntu - has older pre-installed SDK

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Check pre-installed Android SDK version
        run: |
          echo "=== dotnet packs ==="
          ls /usr/share/dotnet/packs/ | grep -i android || echo "none"
          echo "=== dotnet version ==="
          dotnet --version

      - name: Remove SDK 35 if present and install workload
        run: |
          # Remove broken SDK 35 before installing workload
          sudo rm -rf /usr/share/dotnet/packs/Microsoft.Android.Sdk.Linux/35* 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet/packs/Microsoft.Android.Ref.35* 2>/dev/null || true

          # Install workload - will get latest available compatible version
          dotnet workload install maui-android --ignore-failed-sources

          echo "=== Android packs after install ==="
          ls /usr/share/dotnet/packs/ | grep -i android

      - name: Force install Android SDK 34 pack via NuGet feed
        run: |
          # Create a temp project that references the exact SDK version
          mkdir -p /tmp/sdk-fix && cd /tmp/sdk-fix
          dotnet new classlib -n SDKFix --force -f net9.0 > /dev/null

          # Add the specific Android SDK package
          dotnet add SDKFix/SDKFix.csproj package Microsoft.Android.Sdk.Linux \
            --version 34.0.95 \
            --package-directory /tmp/nuget-cache 2>&1 || true

          # Find and extract it
          NUPKG=$(find /tmp/nuget-cache ~/.nuget -name "microsoft.android.sdk.linux.34.0.95.nupkg" 2>/dev/null | head -1)
          echo "nupkg: $NUPKG"

          if [ -n "$NUPKG" ]; then
            sudo mkdir -p /usr/share/dotnet/packs/Microsoft.Android.Sdk.Linux/34.0.95
            sudo unzip -q "$NUPKG" -d /usr/share/dotnet/packs/Microsoft.Android.Sdk.Linux/34.0.95
            echo "✓ SDK 34 installed"
            ls /usr/share/dotnet/packs/Microsoft.Android.Sdk.Linux/
          fi

      - name: Restore NuGet packages
        run: dotnet restore SignalScanner.csproj

      - name: Build APK - force SDK 34
        run: |
          # Find where SDK 34 tools actually are
          SDK34_TOOLS=$(find /usr/share/dotnet/packs/Microsoft.Android.Sdk.Linux/34* -name "Xamarin.Android.Common.targets" 2>/dev/null | head -1)
          echo "SDK34 targets: $SDK34_TOOLS"

          dotnet build SignalScanner.csproj \
            -f net9.0-android \
            -c Debug \
            -t:SignAndroidPackage \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:AndroidSigningKeyAlias=androiddebugkey \
            -p:AndroidSigningKeyPass=android \
            -p:AndroidSigningStorePass=android \
            -p:AndroidSdkBuildToolsVersion=34.0.0 \
            -p:TargetFrameworkVersion=v14.0 \
            -v:detailed 2>&1 | grep -E "(error|warning|APK|apk|->)" | head -60

      - name: Find APK
        run: |
          echo "=== All APK files ==="
          find /home/runner/work -name "*.apk" 2>/dev/null || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SignalScanner-Debug-APK
          path: "**/*.apk"
          retention-days: 30
          if-no-files-found: warn
