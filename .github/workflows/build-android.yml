name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android --ignore-failed-sources

      - name: Write patcher csproj
        run: |
          mkdir -p /tmp/patcher
          cat > /tmp/patcher/patcher.csproj << 'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net9.0</TargetFramework>
              <Nullable>enable</Nullable>
              <ImplicitUsings>enable</ImplicitUsings>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="Mono.Cecil" Version="0.11.5" />
            </ItemGroup>
          </Project>
          EOF

      - name: Write patcher source
        run: |
          cat > /tmp/patcher/Program.cs << 'EOF'
          using System;
          using System.IO;
          using System.IO.Compression;
          using System.Linq;
          using Mono.Cecil;
          using Mono.Cecil.Cil;

          var toolsDir = "/usr/share/dotnet/packs/Microsoft.Android.Sdk.Linux/35.0.105/tools";
          var dllPath  = Path.Combine(toolsDir, "Xamarin.Android.Build.Tasks.dll");
          var tmpOut   = "/tmp/Xamarin.Android.Build.Tasks.patched.dll";

          if (File.Exists(tmpOut)) File.Delete(tmpOut);

          var resolver = new DefaultAssemblyResolver();
          resolver.AddSearchDirectory(toolsDir);
          foreach (var f in Directory.GetFiles("/usr/share/dotnet", "Microsoft.Build.Framework.dll", SearchOption.AllDirectories))
              resolver.AddSearchDirectory(Path.GetDirectoryName(f)!);

          var rParams = new ReaderParameters { AssemblyResolver = resolver, ReadWrite = false, ReadSymbols = false };
          using var asm = AssemblyDefinition.ReadAssembly(dllPath, rParams);
          var module = asm.MainModule;

          var buildApkType = module.Types.FirstOrDefault(t => t.Name == "BuildApk");
          if (buildApkType == null) { Console.WriteLine("ERROR: BuildApk not found"); return; }

          var execMethod = buildApkType.Methods.FirstOrDefault(m => m.Name == "ExecuteWithAbi");
          if (execMethod == null) { Console.WriteLine("ERROR: ExecuteWithAbi not found"); return; }

          var apkInputParam = execMethod.Parameters.FirstOrDefault(p => p.Name == "apkInputPath");
          if (apkInputParam == null) { Console.WriteLine("ERROR: apkInputPath not found"); return; }

          Console.WriteLine("Patching - will create valid empty ZIP before BuildApk runs...");

          // Import methods we need
          var pathGetDirRef  = module.ImportReference(typeof(Path).GetMethod("GetDirectoryName", new[] { typeof(string) }));
          var dirCreateRef   = module.ImportReference(typeof(Directory).GetMethod("CreateDirectory", new[] { typeof(string) }));
          var fileExistsRef  = module.ImportReference(typeof(File).GetMethod("Exists", new[] { typeof(string) }));

          // ZipFile.Open(path, ZipArchiveMode.Create).Dispose() - creates valid empty zip
          var zipOpenRef = module.ImportReference(
              typeof(ZipFile).GetMethod("Open", new[] { typeof(string), typeof(ZipArchiveMode) }));
          var zipDisposeRef = module.ImportReference(
              typeof(ZipArchive).GetMethod("Dispose"));

          var il         = execMethod.Body.GetILProcessor();
          var firstInstr = execMethod.Body.Instructions.First();

          // Inject:
          //   Directory.CreateDirectory(Path.GetDirectoryName(apkInputPath));
          //   if (!File.Exists(apkInputPath))
          //       ZipFile.Open(apkInputPath, ZipArchiveMode.Create).Dispose();

          var nop        = il.Create(OpCodes.Nop);
          var ldParam1   = il.Create(OpCodes.Ldarg, apkInputParam);
          var callGetDir = il.Create(OpCodes.Call, pathGetDirRef);
          var callMkDir  = il.Create(OpCodes.Call, dirCreateRef);
          var popMkDir   = il.Create(OpCodes.Pop);
          var ldParam2   = il.Create(OpCodes.Ldarg, apkInputParam);
          var callExists = il.Create(OpCodes.Call, fileExistsRef);
          var brIfExists = il.Create(OpCodes.Brtrue_S, firstInstr);
          // ZipFile.Open(apkInputPath, ZipArchiveMode.Create).Dispose()
          var ldParam3   = il.Create(OpCodes.Ldarg, apkInputParam);
          var ldZipMode  = il.Create(OpCodes.Ldc_I4, (int)ZipArchiveMode.Create);
          var callZipOpen= il.Create(OpCodes.Call, zipOpenRef);
          var callZipDisp= il.Create(OpCodes.Callvirt, zipDisposeRef);

          il.InsertBefore(firstInstr, nop);
          il.InsertBefore(firstInstr, ldParam1);
          il.InsertBefore(firstInstr, callGetDir);
          il.InsertBefore(firstInstr, callMkDir);
          il.InsertBefore(firstInstr, popMkDir);
          il.InsertBefore(firstInstr, ldParam2);
          il.InsertBefore(firstInstr, callExists);
          il.InsertBefore(firstInstr, brIfExists);
          il.InsertBefore(firstInstr, ldParam3);
          il.InsertBefore(firstInstr, ldZipMode);
          il.InsertBefore(firstInstr, callZipOpen);
          il.InsertBefore(firstInstr, callZipDisp);

          brIfExists.Operand = firstInstr;

          asm.Write(tmpOut, new WriterParameters { WriteSymbols = false });
          Console.WriteLine("Patch written to " + tmpOut);
          EOF

      - name: Run Cecil patcher
        run: cd /tmp/patcher && dotnet run --project patcher.csproj

      - name: Install patched DLL with sudo
        run: |
          DLL="/usr/share/dotnet/packs/Microsoft.Android.Sdk.Linux/35.0.105/tools/Xamarin.Android.Build.Tasks.dll"
          sudo cp -f /tmp/Xamarin.Android.Build.Tasks.patched.dll "$DLL"
          echo "Installed patched DLL: $(du -sh $DLL)"

      - name: Restore NuGet packages
        run: dotnet restore SignalScanner.csproj

      - name: Build APK
        run: |
          dotnet build SignalScanner.csproj \
            -f net9.0-android \
            -c Debug \
            -t:SignAndroidPackage \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:AndroidSigningKeyAlias=androiddebugkey \
            -p:AndroidSigningKeyPass=android \
            -p:AndroidSigningStorePass=android

      - name: Find APK
        run: find /home/runner/work -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SignalScanner-Debug-APK
          path: "**/*.apk"
          retention-days: 30
          if-no-files-found: warn
